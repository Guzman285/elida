<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Boda Carlos & Elida</title>
  </head>
  <body>

    <!-- BARRA FIJA DE MÚSICA -->
    <header class="music-bar">
      <button id="playMusicBtn" class="music-bar-btn" type="button" aria-label="Reproducir canción">
        <span class="bar-text">DALE PLAY</span>
        <span class="bar-circle">
          <svg id="iconPlay" viewBox="0 0 24 24" fill="white" width="14" height="14">
            <polygon points="6,4 20,12 6,20" />
          </svg>
          <svg id="iconPause" viewBox="0 0 24 24" fill="white" width="14" height="14" style="display:none">
            <rect x="5" y="4" width="4" height="16"/>
            <rect x="15" y="4" width="4" height="16"/>
          </svg>
        </span>
        <span class="bar-text">A NUESTRA CANCIÓN</span>
      </button>
      <audio id="weddingSong" src="./assets/audio/camila.mp3" loop></audio>
    </header>

    <!-- SECCIÓN HERO -->
    <section class="hero">

      <!-- Flor: esquina superior DERECHA -->
      <img src="./assets/img/fondos/flor1.png" alt="" class="hero-flores" />

      <!-- Zona superior: versículo izquierda, flor derecha -->
      <div class="hero-top">
        <div class="hero-versiculo">
          <p class="versiculo-texto">
            &ldquo;El amor es paciente, es bondadoso. El amor no es
            envidioso ni jactancioso. &hellip;Todo lo soporta, todo lo
            cree, todo lo espera, todo lo soporta.&rdquo;
          </p>
          <p class="versiculo-ref">1 Corintios 13:4-7</p>
        </div>
      </div>

      <!-- Nombres: cada uno en su línea, grandes y centrados -->
      <div class="hero-nombres">
        <p class="nombre-linea">Carlos</p>
        <p class="nombre-y">y</p>
        <p class="nombre-linea">Elida</p>
      </div>

    </section>

    <main class="main-content"></main>

    <script src="./assets/js/app.js"></script>
  </body>
</html>
